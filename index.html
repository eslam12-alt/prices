<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة أسعار أبو رشاد 📦</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .admin-box { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #d1e9f0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: white; }
        .price { color: var(--success); font-weight: bold; }
        .status { font-size: 13px; color: #666; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>إدارة أسعار أبو رشاد 📦</h2>
    <div id="syncStatus" class="status">جاري التحميل...</div>
    
    <div class="admin-box">
        <input type="text" id="itemName" placeholder="اسم الصنف الجديد">
        <input type="number" id="itemPrice" placeholder="السعر">
        <button id="addBtn" onclick="sendData()">حفظ في جوجل شيت ➕</button>
    </div>

    <input type="text" id="search" onkeyup="filter()" placeholder="🔍 ابحث في القائمة...">
    
    <table>
        <thead><tr><th>الصنف</th><th>السعر</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>
