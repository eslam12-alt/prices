<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسعار أبو رشاد 📦</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; direction: rtl; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; text-align: right; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #27ae60; color: white; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2em; }
        .update-time { font-size: 10px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أسعار أبو رشاد 📦</h2>
        <div id="time" class="update-time">جاري التحميل...</div>
        <input type="text" id="search" onkeyup="filter()" placeholder="🔍 ابحث عن صنف...">
        <table>
            <thead><tr><th>الصنف</th><th>سعر البيع</th></tr></thead>
            <tbody id="body"></tbody>
        </table>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwBxUqDbgzeE93IYHwUGUo27pgip44SGe15eBdTx9MLPujPEkB6KbcDyfTEdHFP7F0WLdCztFLQtD7/pub?output=csv';
        
        async function getData() {
            try {
                const res = await fetch(url + '&t=' + new Date().getTime());
                const text = await res.text();
                // حل مشكلة الفواصل في الشيت العربي (فحص الفاصلة المنقوطة أولاً)
                const rows = text.split('\n').filter(r => r.trim() !== "");
                const tbody = document.getElementById('body');
                tbody.innerHTML = '';

                rows.forEach((row, index) => {
                    // تقسيم السطر (بنجرب الفاصلة المنقوطة للأمان)
                    let cols = row.includes(';') ? row.split(';') : row.split(',');
                    
                    // تنظيف البيانات من علامات التنصيص
                    let name = cols[0] ? cols[0].replace(/"/g, '').trim() : "";
                    let price = cols[1] ? cols[1].replace(/"/g, '').trim() : "";

                    // التأكد إن السطر مش هو سطر العنوان وإن فيه بيانات
                    if(name && name !== "الصنف" && name !== "blank") {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${name}</td><td class="price">${price} ج.م</td>`;
                        tbody.appendChild(tr);
                    }
                });
                document.getElementById('time').innerText = "آخر تحديث: " + new Date().toLocaleTimeString('ar-EG');
            } catch (e) { console.error("Error fetching data"); }
        }

        function filter() {
            let val = document.getElementById('search').value.toLowerCase();
            let trs = document.querySelectorAll('#body tr');
            trs.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        getData();
        setInterval(getData, 30000); // تحديث تلقائي كل 30 ثانية
    </script>
</body>
</html>
