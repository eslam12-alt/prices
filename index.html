<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>إدارة أسعار أبو رشاد 📦</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }

        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        /* لوحة الإضافة */
        .admin-box { background: #e8f4f8; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #d1e9f0; }
        .admin-box h4 { margin-top: 0; color: #2980b9; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--success); }
        button { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #bdc3c7; }

        /* البحث والجدول */
        .search-box { margin-top: 20px; position: relative; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: white; }
        .price { color: var(--success); font-weight: bold; font-size: 1.1em; }
        .status { font-size: 12px; color: #666; margin-top: 10px; text-align: center; height: 15px; }
        .last-sync { font-size: 10px; color: #95a5a6; text-align: center; margin-bottom: 10px; }
    </style>
</head>

        </thead>

    </table>
</div>
